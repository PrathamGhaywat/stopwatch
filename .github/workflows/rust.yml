# .github/workflows/release.yml
name: Rust Cross-Platform Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add cross-compilation targets
        run: |
          rustup target add x86_64-unknown-linux-gnu
          rustup target add x86_64-pc-windows-gnu
          rustup target add x86_64-apple-darwin

      - name: Build release
        run: cargo build --release

      - name: Package artifacts
        run: |
          mkdir -p release
          if ([ "${{ runner.os }}" == "Windows" ]); then
            powershell Compress-Archive -Path target/release/* -DestinationPath release/stopwatch-windows.zip
          elif ([ "${{ runner.os }}" == "macOS" ]); then
            tar -czf release/stopwatch-macos.tar.gz -C target/release .
          else
            tar -czf release/stopwatch-linux.tar.gz -C target/release .
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          files: release/stopwatch-*.zip, release/stopwatch-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
